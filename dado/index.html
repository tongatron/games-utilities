<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dado</title>
  <style>
    :root {
      --bg: #000000;
      --fg: #ffffff;
      --muted: #6f6f6f;
      --size: 96px;
      --pip: 10px;
      --gap: 20px;
    }

    * {
      box-sizing: border-box;
      image-rendering: pixelated;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: "Courier New", "IBM Plex Mono", "Liberation Mono", monospace;
    }

    body {
      overflow-x: hidden;
    }

    .wrap {
      width: min(92vw, 520px);
      margin: 0 auto;
      padding: 28px 16px 32px;
      display: grid;
      gap: var(--gap);
      justify-items: center;
    }

    .titlebox {
      width: 100%;
      text-align: center;
      padding: 0;
      background: transparent;
      box-shadow: none;
      border: none;
    }

    .title {
      margin: 0;
      font-size: clamp(18px, 4vw, 24px);
      line-height: 1;
      font-weight: 700;
      letter-spacing: 6px;
    }

    .subtitle {
      display: none;
    }

    .scene {
      width: 100%;
      min-height: 180px;
      perspective: 800px;
      display: grid;
      place-items: center;
      position: relative;
      border: none;
      padding: 0;
    }

    .dice-stage {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
    }

    .scene[data-dice-count="1"] .dice-stage {
      gap: 0;
    }

    .scene[data-dice-count="3"] .dice-stage {
      gap: 12px;
    }

    .scene[data-dice-count="4"] .dice-stage,
    .scene[data-dice-count="5"] .dice-stage {
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .shadow {
      display: none;
    }

    .cube {
      width: var(--die-size, var(--size));
      height: var(--die-size, var(--size));
      position: relative;
      transform-style: preserve-3d;
      transform: rotateX(-25deg) rotateY(35deg);
      will-change: transform;
    }

    .face {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      padding: max(8px, calc(var(--die-size, var(--size)) * 0.12));
      background: #fff;
      border: 1px solid #000;
      box-shadow: 0 0 0 1px #fff;
      backface-visibility: hidden;
    }

    .pip {
      width: var(--die-pip, var(--pip));
      height: var(--die-pip, var(--pip));
      align-self: center;
      justify-self: center;
      background: #000;
      opacity: 0;
      box-shadow: none;
    }

    .show { opacity: 1; }

    .front  { transform: translateZ(calc(var(--die-size, var(--size)) / 2)); }
    .back   { transform: rotateY(180deg) translateZ(calc(var(--die-size, var(--size)) / 2)); }
    .right  { transform: rotateY(90deg) translateZ(calc(var(--die-size, var(--size)) / 2)); }
    .left   { transform: rotateY(-90deg) translateZ(calc(var(--die-size, var(--size)) / 2)); }
    .top    { transform: rotateX(90deg) translateZ(calc(var(--die-size, var(--size)) / 2)); }
    .bottom { transform: rotateX(-90deg) translateZ(calc(var(--die-size, var(--size)) / 2)); }

    .controls {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .mode-controls {
      width: 100%;
      display: flex;
      justify-content: flex-start;
      gap: 8px;
      flex-wrap: wrap;
      justify-self: start;
    }

    .mode-btn.active {
      background: #fff;
      color: #000;
    }

    button, input {
      font-family: inherit;
      letter-spacing: 1px;
    }

    button {
      appearance: none;
      border: 1px solid #fff;
      background: transparent;
      color: #fff;
      padding: 10px 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      box-shadow: none;
      transition: background .12s ease, color .12s ease, opacity .12s ease;
    }

    button:hover {
      background: #fff;
      color: #000;
    }

    button:active {
      opacity: 0.7;
      transform: none;
      box-shadow: none;
    }

    button:disabled {
      opacity: 0.35;
      cursor: wait;
    }

    .stats {
      width: 100%;
      display: grid;
      gap: 14px;
      padding: 0;
      border: none;
      background: transparent;
      box-shadow: none;
    }

    .panel-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--muted);
      border-bottom: none;
      padding-bottom: 0;
      text-align: center;
    }

    .range-note {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }

    .chart-wrap {
      display: grid;
      gap: 10px;
    }

    .chart-row {
      display: grid;
      grid-template-columns: 2ch 1fr minmax(32px, auto);
      align-items: center;
      gap: 8px;
    }

    .chart-label,
    .chart-value {
      font-weight: 400;
      font-size: 11px;
      color: #fff;
      white-space: nowrap;
    }

    .chart-bar-box {
      height: 8px;
      border: none;
      background: #1a1a1a;
      overflow: hidden;
    }

    .chart-bar {
      height: 100%;
      width: 0%;
      background: #fff;
      transition: width .18s linear;
    }

    .metrics-wrap {
      display: grid;
      gap: 14px;
      justify-items: center;
    }

    .total-wrap {
      display: grid;
      gap: 4px;
      justify-items: center;
      width: 100%;
      border: none;
      padding: 4px 0 0;
      background: transparent;
    }

    .total-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    .total-value {
      font-size: 24px;
      line-height: 1;
      font-weight: 700;
      color: #fff;
      text-shadow: none;
    }

    .actions-wrap {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
    }

    .bulk-wrap {
      display: grid;
      grid-template-columns: 70px auto;
      align-items: center;
      gap: 6px;
      justify-self: start;
    }

    .bulk-wrap input {
      width: 70px;
      padding: 9px 7px;
      border: 1px solid #fff;
      background: transparent;
      color: #fff;
      font-size: 11px;
      min-width: 0;
      outline: none;
      text-align: center;
    }

    .reset-small,
    .bulk-small {
      padding: 9px 10px;
      font-size: 10px;
      min-width: 0;
    }

    .footer-note {
      display: none;
    }

    @media (max-width: 640px) {
      :root {
        --size: 88px;
        --pip: 9px;
      }

      .scene {
        min-height: 164px;
      }

      .dice-stage {
        gap: 12px;
      }

      .actions-wrap {
        grid-template-columns: 1fr;
      }

      .bulk-wrap {
        width: 100%;
        grid-template-columns: 68px 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="titlebox" aria-label="Titolo interfaccia">
      <h1 class="title">DADO</h1>
    </section>

    <div class="scene" id="scene" aria-label="Animazione dado">
      <div class="dice-stage" id="diceStage"></div>
    </div>

    <div class="controls">
      <button id="rollBtn">Lancia il dado</button>
    </div>

    <section class="stats">
      <div class="panel-title" id="statsTitle">statistiche facce</div>

      <div class="chart-wrap" id="chartWrap" aria-label="Istogramma dei lanci"></div>

      <div class="metrics-wrap">
        <div class="total-wrap">
          <div class="total-label">Totale lanci</div>
          <div id="totalCount" class="total-value">0</div>
        </div>

        <div class="actions-wrap">
          <div class="bulk-wrap">
            <input id="bulkCount" type="number" min="1" step="1" value="100" aria-label="Numero di lanci casuali" />
            <button id="bulkBtn" class="bulk-small">Lancia X volte</button>
          </div>
          <button id="resetBtn" class="reset-small">Azzera</button>
        </div>

        <div class="mode-controls" aria-label="Selezione numero dadi">
          <button class="mode-btn active" data-dice-mode="1">1 dado</button>
          <button class="mode-btn" data-dice-mode="2">2 dadi</button>
          <button class="mode-btn" data-dice-mode="3">3 dadi</button>
          <button class="mode-btn" data-dice-mode="4">4 dadi</button>
          <button class="mode-btn" data-dice-mode="5">5 dadi</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const scene = document.getElementById('scene');
    const diceStage = document.getElementById('diceStage');
    const rollBtn = document.getElementById('rollBtn');
    const resetBtn = document.getElementById('resetBtn');
    const bulkBtn = document.getElementById('bulkBtn');
    const bulkCountEl = document.getElementById('bulkCount');
    const totalEl = document.getElementById('totalCount');
    const statsTitle = document.getElementById('statsTitle');
    const chartWrap = document.getElementById('chartWrap');
    const modeBtns = [...document.querySelectorAll('[data-dice-mode]')];

    const storageKey = 'dice-state-v2';
    const baseOrientations = {
      1: { x: 0, y: 0 },
      2: { x: 90, y: 0 },
      3: { x: 0, y: -90 },
      4: { x: 0, y: 90 },
      5: { x: -90, y: 0 },
      6: { x: 0, y: 180 }
    };
    const faceLayouts = {
      1: [4],
      2: [0, 8],
      3: [2, 4, 6],
      4: [0, 2, 6, 8],
      5: [0, 2, 4, 6, 8],
      6: [0, 2, 3, 5, 6, 8]
    };
    const faceMap = [
      ['front', 1],
      ['back', 6],
      ['right', 3],
      ['left', 4],
      ['top', 5],
      ['bottom', 2]
    ];
    const sizePresets = {
      1: { size: 96, pip: 10 },
      2: { size: 76, pip: 8 },
      3: { size: 64, pip: 7 },
      4: { size: 56, pip: 6 },
      5: { size: 50, pip: 5 }
    };

    const state = loadState();
    let currentMode = state.selectedMode;
    let countEls = {};
    let barEls = {};
    let rolling = false;
    let diceEls = [];
    let currentRotations = [];
    let rollTimeoutId = null;

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function sanitizeHistory(entries, min, max) {
      if (!Array.isArray(entries)) return [];

      return entries.filter((value) => Number.isInteger(value) && value >= min && value <= max);
    }

    function loadState() {
      try {
        const stored = JSON.parse(localStorage.getItem(storageKey) || 'null');

        if (stored && typeof stored === 'object') {
          const histories = stored.histories && typeof stored.histories === 'object' ? stored.histories : {};

          return {
            selectedMode: [1, 2, 3, 4, 5].includes(Number(stored.selectedMode)) ? Number(stored.selectedMode) : 1,
            histories: {
              1: sanitizeHistory(histories[1], 1, 6),
              2: sanitizeHistory(histories[2], 2, 12),
              3: sanitizeHistory(histories[3], 3, 18),
              4: sanitizeHistory(histories[4], 4, 24),
              5: sanitizeHistory(histories[5], 5, 30)
            }
          };
        }
      } catch (error) {}

      let legacyHistory = [];
      try {
        legacyHistory = sanitizeHistory(JSON.parse(localStorage.getItem('dice-history') || '[]'), 1, 6);
      } catch (error) {}

      return {
        selectedMode: 1,
        histories: {
          1: legacyHistory,
          2: [],
          3: [],
          4: [],
          5: []
        }
      };
    }

    function saveState() {
      state.selectedMode = currentMode;
      localStorage.setItem(storageKey, JSON.stringify(state));
      localStorage.removeItem('dice-history');
    }

    function getHistory(mode = currentMode) {
      if (!Array.isArray(state.histories[mode])) {
        state.histories[mode] = [];
      }

      return state.histories[mode];
    }

    function getOutcomeRange(mode = currentMode) {
      return {
        min: mode,
        max: mode * 6
      };
    }

    function createFaceMarkup(faceClass, value) {
      const visiblePips = faceLayouts[value];
      const pips = Array.from({ length: 9 }, (_, index) => {
        const showClass = visiblePips.includes(index) ? ' show' : '';
        return `<span class="pip${showClass}"></span>`;
      }).join('');

      return `<div class="face ${faceClass}">${pips}</div>`;
    }

    function createCubeMarkup(index) {
      const preset = sizePresets[currentMode];
      const faces = faceMap
        .map(([faceClass, value]) => createFaceMarkup(faceClass, value))
        .join('');

      return `<div class="cube" data-die-index="${index}" style="--die-size:${preset.size}px;--die-pip:${preset.pip}px;">${faces}</div>`;
    }

    function applyTransform(cubeEl, x, y) {
      cubeEl.style.transform = `rotateX(${x}deg) rotateY(${y}deg)`;
    }

    function renderDice() {
      scene.dataset.diceCount = String(currentMode);
      diceStage.innerHTML = Array.from({ length: currentMode }, (_, index) => createCubeMarkup(index)).join('');
      diceEls = [...diceStage.querySelectorAll('.cube')];
      currentRotations = Array.from({ length: diceEls.length }, () => ({ x: -25, y: 35 }));

      diceEls.forEach((cubeEl, index) => {
        cubeEl.style.transition = 'none';
        applyTransform(cubeEl, currentRotations[index].x, currentRotations[index].y);
      });
    }

    function renderChart() {
      const { min, max } = getOutcomeRange();
      countEls = {};
      barEls = {};

      const rows = [];
      for (let value = min; value <= max; value++) {
        rows.push(
          `<div class="chart-row">` +
            `<span class="chart-label">${value}</span>` +
            `<div class="chart-bar-box"><div class="chart-bar" id="bar${value}"></div></div>` +
            `<span class="chart-value" id="count${value}">0</span>` +
          `</div>`
        );
      }

      chartWrap.innerHTML = rows.join('');

      for (let value = min; value <= max; value++) {
        countEls[value] = document.getElementById(`count${value}`);
        barEls[value] = document.getElementById(`bar${value}`);
      }
    }

    function updateStats() {
      const { min, max } = getOutcomeRange();
      const history = getHistory();
      const counts = {};

      renderChart();

      for (let value = min; value <= max; value++) {
        counts[value] = 0;
      }

      history.forEach((value) => {
        if (counts[value] !== undefined) {
          counts[value] += 1;
        }
      });

      const maxCount = Math.max(1, ...Object.values(counts));

      for (let value = min; value <= max; value++) {
        countEls[value].textContent = counts[value];
        barEls[value].style.width = `${(counts[value] / maxCount) * 100}%`;
      }

      statsTitle.textContent = currentMode === 1 ? 'statistiche facce' : 'statistiche somme';
      chartWrap.setAttribute(
        'aria-label',
        currentMode === 1 ? 'Istogramma dei lanci' : `Istogramma delle somme di ${currentMode} dadi`
      );
      totalEl.textContent = history.length;
      rollBtn.textContent = currentMode === 1 ? 'Lancia il dado' : `Lancia ${currentMode} dadi`;
    }

    function setControlsDisabled(disabled) {
      rollBtn.disabled = disabled;
      resetBtn.disabled = disabled;
      bulkBtn.disabled = disabled;
      bulkCountEl.disabled = disabled;
      modeBtns.forEach((btn) => {
        btn.disabled = disabled;
      });
    }

    function getRollResults() {
      return Array.from({ length: currentMode }, () => randomInt(1, 6));
    }

    function sumResults(results) {
      return results.reduce((sum, value) => sum + value, 0);
    }

    function setDiceFaces(results) {
      results.forEach((result, index) => {
        const cubeEl = diceEls[index];
        if (!cubeEl) return;

        const base = baseOrientations[result];
        cubeEl.style.transition = 'none';
        applyTransform(cubeEl, base.x, base.y);
        currentRotations[index] = { x: base.x, y: base.y };
      });
    }

    function recordResults(results) {
      getHistory().push(sumResults(results));
      saveState();
      updateStats();
    }

    function finishRoll(results) {
      clearTimeout(rollTimeoutId);
      setDiceFaces(results);
      recordResults(results);

      requestAnimationFrame(() => {
        setControlsDisabled(false);
        rolling = false;
      });
    }

    function switchMode(nextMode) {
      if (rolling || nextMode === currentMode) return;

      currentMode = nextMode;
      modeBtns.forEach((btn) => {
        btn.classList.toggle('active', Number(btn.dataset.diceMode) === currentMode);
      });

      saveState();
      renderDice();
      updateStats();
    }

    function rollDice() {
      if (rolling) return;

      rolling = true;
      setControlsDisabled(true);

      const results = getRollResults();
      clearTimeout(rollTimeoutId);

      results.forEach((result, index) => {
        const cubeEl = diceEls[index];
        const base = baseOrientations[result];
        const spinsX = randomInt(4, 6) * 360;
        const spinsY = randomInt(4, 6) * 360;
        const targetX = base.x + spinsX;
        const targetY = base.y + spinsY;

        cubeEl.style.transition = 'transform 1.05s cubic-bezier(0.22, 0.78, 0.18, 1)';
        applyTransform(cubeEl, targetX, targetY);
        currentRotations[index] = { x: targetX, y: targetY };
      });

      rollTimeoutId = setTimeout(() => finishRoll(results), 1150);
    }

    rollBtn.addEventListener('click', rollDice);

    modeBtns.forEach((btn) => {
      btn.addEventListener('click', () => {
        switchMode(Number(btn.dataset.diceMode));
      });
    });

    bulkBtn.addEventListener('click', () => {
      if (rolling) return;

      const n = Math.max(1, Math.floor(Number(bulkCountEl.value) || 1));
      const history = getHistory();
      let lastResults = null;

      bulkCountEl.value = String(n);

      for (let i = 0; i < n; i++) {
        lastResults = getRollResults();
        history.push(sumResults(lastResults));
      }

      if (lastResults) {
        setDiceFaces(lastResults);
      }

      saveState();
      updateStats();
    });

    resetBtn.addEventListener('click', () => {
      if (rolling) return;

      state.histories[currentMode] = [];
      saveState();
      renderDice();
      updateStats();
    });

    modeBtns.forEach((btn) => {
      btn.classList.toggle('active', Number(btn.dataset.diceMode) === currentMode);
    });

    renderDice();
    updateStats();
    saveState();
  </script>
</body>
</html>
